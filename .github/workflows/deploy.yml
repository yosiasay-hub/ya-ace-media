name: Deploy to Cloudflare

# Static export pipeline:
#   next build  ->  out/  ->  wrangler deploy (assets)
#
# NOTE: If this workflow fails at the deploy step with an error like:
#   TypeError: Headers.append: "***\n***" is an invalid header value
# the CLOUDFLARE_API_TOKEN repo secret has a stray newline / whitespace.
# Fix: rotate the token at https://dash.cloudflare.com/profile/api-tokens
# and re-paste it cleanly into the GitHub repo secret (no trailing newline).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Type check
        run: npm run typecheck

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL_HE: https://ya-ace-media.co.il
          NEXT_PUBLIC_SITE_URL_EN: https://en.ya-ace-media.co.il

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
